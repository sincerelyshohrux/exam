<!DOCTYPE html>
<html>
<head>
<title>Book List</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-5xl mx-auto mt-10">

<h1 class="text-4xl font-bold text-center mb-8">📚 Book Library</h1>

<div class="text-right mb-6">
<a href="/create/" class="bg-blue-500 text-white px-5 py-2 rounded-lg hover:bg-blue-600">
Add New Book
</a>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

{% for book in books %}

<div class="bg-white p-6 rounded-xl shadow hover:shadow-lg transition">

<h2 class="text-xl font-semibold mb-2">{{ book.title }}</h2>

<p class="text-gray-600">Author: {{ book.author }}</p>

<p class="text-green-600 font-bold mt-2">${{ book.price }}</p>

<p class="text-sm text-gray-400 mt-2">
Created: {{ book.created_at }}
</p>

<a href="/book/{{ book.id }}/"
class="inline-block mt-4 text-blue-500 hover:underline">
View Details
</a>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
