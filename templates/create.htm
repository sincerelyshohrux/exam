<!DOCTYPE html>
<html>
<head>
<title>Create Book</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-20">

<div class="bg-white p-8 rounded-xl shadow">

<h1 class="text-3xl font-bold mb-6 text-center">Add New Book</h1>

<form method="POST">

{% csrf_token %}

<div class="mb-4">
<label class="block mb-1 font-semibold">Title</label>
<input type="text" name="title"
class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
</div>

<div class="mb-4">
<label class="block mb-1 font-semibold">Author</label>
<input type="text" name="author"
class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
</div>

<div class="mb-6">
<label class="block mb-1 font-semibold">Price</label>
<input type="number" name="price"
class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
</div>

<button type="submit"
class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">
Save Book
</button>

</form>

<a href="/" class="block text-center mt-4 text-gray-500 hover:underline">
Back to list
</a>

</div>

</div>

</body>
</html>
